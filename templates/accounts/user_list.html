{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block content %}
<h3 class="mb-4"><i class="fa-solid fa-users-gear"></i> Users</h3>
<div class="card p-3">
    <table class="table table-hover">
        <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Department</th><th>Active</th></tr></thead>
        <tbody>
        {% for u in users %}
            <tr>
                <td>{{ u.email }}</td>
                <td>{{ u.full_name }}</td>
                <td><span class="badge bg-info text-dark">{{ u.get_role_display }}</span></td>
                <td>{{ u.department|default:"—" }}</td>
                <td>{% if u.is_active %}<i class="fa-solid fa-check text-success"></i>{% else %}<i class="fa-solid fa-xmark text-danger"></i>{% endif %}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
